name: 小米17 GKI Bazel构建 6.12（SukiSU Ultra）

env:
  TZ: Asia/Shanghai
  DEVICE_MODEL: '25113PN0EC'
  DEVICE_CODENAME: 'pudding'
  DEVICE_SOC: 'SM8850'
  ANDROID_VERSION: 'android16'
  TAG_HEAD: 'Xiaomi17-GKI-build'

on:
  workflow_dispatch:
    inputs:
      manifest_branch:
        description: 'kernel/manifest 分支(默认 common-android16-6.12，可选 common-android16-6.12-2025-12 等)'
        required: true
        type: string
        default: 'common-android16-6.12'
      mode:
        description: '执行模式(precheck 只做预检 / image 仅构建内核镜像 / dist 构建完整dist)'
        required: true
        type: choice
        default: 'precheck'
        options:
          - 'precheck'
          - 'image'
          - 'dist'
      build_target:
        description: '构建目标(dist/autofdo_dist/both)'
        required: true
        type: choice
        default: 'dist'
        options:
          - 'dist'
          - 'autofdo_dist'
          - 'both'
      kernel_suffix:
        description: '产物后缀(可选，如 4k；会拼到AnyKernel3文件名末尾)'
        required: true
        type: string
        default: 'pudding'
      enable_sukisu:
        description: '是否注入 SukiSU Ultra（builtin）'
        required: true
        type: boolean
        default: true
      sukisu_ref:
        description: 'SukiSU 版本(分支/标签/提交；默认 builtin，建议失败时固定为某个提交)'
        required: true
        type: string
        default: 'builtin'
      enable_precheck:
        description: '是否启用预检(会额外跑一次 kernel_aarch64_config；更稳但更慢)'
        required: true
        type: boolean
        default: false
      artifact_profile:
        description: '上传产物范围(minimal 仅内核镜像相关 / full 完整 dist / both 两者都传)'
        required: true
        type: choice
        default: 'minimal'
        options:
          - 'minimal'
          - 'full'
          - 'both'
      flash_block:
        description: 'AnyKernel3 刷写分区(默认init_boot；不确定可选auto)'
        required: true
        type: choice
        default: 'init_boot'
        options:
          - 'init_boot'
          - 'boot'
          - 'auto'
      include_dtbo:
        description: 'AnyKernel3 是否携带 dtbo.img(auto 有就带 / yes 强制带 / no 不带)'
        required: true
        type: choice
        default: 'auto'
        options:
          - 'auto'
          - 'yes'
          - 'no'
      upload_dist:
        description: '是否上传 dist 工件'
        required: true
        type: boolean
        default: true
      create_release:
        description: '是否创建 GitHub Release（会打 tag 并上传打包产物）'
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            jq \
            openjdk-17-jdk-headless \
            python-is-python3 \
            python3 \
            bc \
            bison \
            flex \
            build-essential \
            libssl-dev \
            libelf-dev \
            rsync \
            unzip \
            zip \
            xz-utils \
            file

      - name: 载入 Bazel 缓存
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazel-disk
            ~/.cache/bazel-repo
            ~/.cache/bazelisk
          key: bazel-${{ runner.os }}-xiaomi17-${{ inputs.manifest_branch }}
          restore-keys: |
            bazel-${{ runner.os }}-xiaomi17-
            bazel-${{ runner.os }}-

      - name: 安装 repo 工具
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
          chmod +x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: 同步 Kernel workspace（manifest）
        run: |
          rm -rf kernel_workspace
          mkdir -p kernel_workspace
          cd kernel_workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b "${{ inputs.manifest_branch }}" --depth=1

      - name: 载入 repo 缓存
        uses: actions/cache@v5
        with:
          path: |
            kernel_workspace/.repo/project-objects
            kernel_workspace/.repo/projects
          key: repo-${{ runner.os }}-${{ inputs.manifest_branch }}
          restore-keys: |
            repo-${{ runner.os }}-${{ inputs.manifest_branch }}-
            repo-${{ runner.os }}-

      - name: repo sync
        run: |
          set -euo pipefail
          cd kernel_workspace
          repo sync -c -j"$(nproc)" --no-tags --no-clone-bundle --optimized-fetch --prune

      - name: 注入 SukiSU Ultra（builtin）
        if: inputs.enable_sukisu
        run: |
          set -euo pipefail
          cd kernel_workspace/common
          curl -fsSL "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | sh -s "${{ inputs.sukisu_ref }}"
          test -f drivers/kernelsu/Kconfig
          grep -q "config KSU" drivers/kernelsu/Kconfig
          sed -i '/^#include <linux\/slab\.h>/a #include <linux\/vmalloc.h>' drivers/kernelsu/supercalls.c
          cat > drivers/kernelsu/mark_stub.c <<'EOF'
          #include <linux/compiler.h>
          
          void __weak ksu_mark_running_process(void)
          {
          }
          EOF
          if ! grep -q '^ksu_obj-y += mark_stub\.o$' drivers/kernelsu/Kbuild; then
            sed -i '/^ksu_obj-y += supercalls\.o$/a ksu_obj-y += mark_stub.o' drivers/kernelsu/Kbuild
          fi

      - name: 快速预检（KSU 文件检查）
        if: inputs.enable_sukisu
        run: |
          set -euo pipefail
          cd kernel_workspace
          cd common
          {
            echo "sukisu_ref=${{ inputs.sukisu_ref }}"
            test -f drivers/kernelsu/Kconfig
            test -f drivers/kernelsu/Kbuild
            test -f drivers/kernelsu/supercalls.c
            test -f drivers/kernelsu/mark_stub.c
            grep -n '^#include <linux/vmalloc\.h>$' drivers/kernelsu/supercalls.c
            grep -n '^ksu_obj-y += mark_stub\.o$' drivers/kernelsu/Kbuild
            grep -RIn "ksu_mark_running_process" drivers/kernelsu | head -n 20
          } 2>&1 | tee "$GITHUB_WORKSPACE/kernel_workspace/ksu_precheck.log"

      - name: 快速预检（仅生成内核配置）
        if: inputs.mode == 'precheck' || inputs.enable_precheck
        run: |
          set -euo pipefail
          cd kernel_workspace
          chmod +x tools/bazel
          tools/bazel build --disk_cache="$HOME/.cache/bazel-disk" --repository_cache="$HOME/.cache/bazel-repo" --config=fast --notrim --lto=none --config=release //common:kernel_aarch64_config 2>&1 | tee "$PWD/bazel_precheck.log"

      - name: 构建内核镜像（Bazel, fast, notrim + lto=none）
        if: inputs.mode == 'image'
        run: |
          set -euo pipefail
          cd kernel_workspace
          chmod +x tools/bazel
          rm -rf out_dist
          mkdir -p out_dist
          tools/bazel build --disk_cache="$HOME/.cache/bazel-disk" --repository_cache="$HOME/.cache/bazel-repo" --config=fast --notrim --lto=none --config=release //common:kernel_aarch64 2>&1 | tee "$PWD/bazel_build.log"
          BAZEL_BIN="$(tools/bazel info bazel-bin)"
          IMG=""
          for p in \
            "$BAZEL_BIN/common/kernel_aarch64/Image" \
            "$BAZEL_BIN/common/kernel_aarch64/Image.lz4" \
            "$BAZEL_BIN/common/kernel_aarch64/Image.gz" \
            "$BAZEL_BIN/common/kernel_aarch64/Image.lz4-dtb" \
            "$BAZEL_BIN/common/kernel_aarch64/Image.gz-dtb"; do
            if [ -f "$p" ]; then
              IMG="$p"
              break
            fi
          done
          if [ -z "$IMG" ]; then
            IMG="$(find "$BAZEL_BIN" -maxdepth 30 -type f \( -name 'Image' -o -name 'Image.lz4' -o -name 'Image.gz' -o -name 'Image.lz4-dtb' -o -name 'Image.gz-dtb' \) 2>/dev/null | head -n 1 || true)"
          fi
          test -n "$IMG"
          cp -a "$IMG" out_dist/Image
          DTBO=""
          if [ -f "$BAZEL_BIN/common/kernel_aarch64/dtbo.img" ]; then
            DTBO="$BAZEL_BIN/common/kernel_aarch64/dtbo.img"
          else
            DTBO="$(find "$BAZEL_BIN" -maxdepth 30 -type f -name 'dtbo.img' 2>/dev/null | head -n 1 || true)"
          fi
          if [ -n "$DTBO" ]; then
            cp -a "$DTBO" out_dist/dtbo.img
          fi
          echo "out_dist 内容预览："
          ls -lah out_dist || true

      - name: 构建 GKI（Bazel dist, notrim + lto=none）
        if: inputs.mode == 'dist'
        run: |
          set -euo pipefail
          cd kernel_workspace
          chmod +x tools/bazel
          rm -rf out_dist
          mkdir -p out_dist
          if [ "${{ inputs.build_target }}" = "dist" ]; then
            tools/bazel run --disk_cache="$HOME/.cache/bazel-disk" --repository_cache="$HOME/.cache/bazel-repo" --config=fast --notrim --lto=none --config=release //common:kernel_aarch64_dist -- --destdir="$PWD/out_dist" --wipe_destdir 2>&1 | tee "$PWD/bazel_build.log"
          elif [ "${{ inputs.build_target }}" = "autofdo_dist" ]; then
            tools/bazel run --disk_cache="$HOME/.cache/bazel-disk" --repository_cache="$HOME/.cache/bazel-repo" --config=fast --notrim --lto=none --config=release //common:kernel_aarch64_autofdo_dist -- --destdir="$PWD/out_dist" --wipe_destdir 2>&1 | tee "$PWD/bazel_build.log"
          else
            tools/bazel run --disk_cache="$HOME/.cache/bazel-disk" --repository_cache="$HOME/.cache/bazel-repo" --config=fast --notrim --lto=none --config=release //common:kernel_aarch64_dist -- --destdir="$PWD/out_dist" --wipe_destdir 2>&1 | tee "$PWD/bazel_build.log"
            tools/bazel run --disk_cache="$HOME/.cache/bazel-disk" --repository_cache="$HOME/.cache/bazel-repo" --config=fast --notrim --lto=none --config=release //common:kernel_aarch64_autofdo_dist -- --destdir="$PWD/out_dist" --wipe_destdir 2>&1 | tee -a "$PWD/bazel_build.log"
          fi
          echo "dist 内容预览："
          ls -lah out_dist || true
          test -n "$(ls -A out_dist 2>/dev/null)"
          rm -rf out_min
          mkdir -p out_min
          for f in Image Image.gz Image.lz4 Image.lz4-dtb Image.gz-dtb System.map Module.symvers modules.load modules.blocklist dtbo.img; do
            if [ -f "out_dist/$f" ]; then
              cp -a "out_dist/$f" out_min/
            fi
          done
          if [ -n "$(ls -A out_min 2>/dev/null)" ]; then
            (cd out_min && zip -q -r9 "../xiaomi17_${{ inputs.build_target }}_${{ inputs.manifest_branch }}_minimal.zip" .)
          fi
          if [ "${{ inputs.artifact_profile }}" != "minimal" ]; then
            tar -cJf "xiaomi17_${{ inputs.build_target }}_${{ inputs.manifest_branch }}_dist.tar.xz" -C "$PWD" out_dist
          fi

      - name: 克隆 AnyKernel3 并打包（可直接刷入）
        if: inputs.mode == 'image' || inputs.mode == 'dist'
        id: create_zip
        run: |
          set -euo pipefail
          cd kernel_workspace
          rm -rf AnyKernel3
          git clone https://github.com/cctv18/AnyKernel3 --depth=1 AnyKernel3
          rm -rf ./AnyKernel3/.git
          cd AnyKernel3
          if [ -f ../out_dist/Image ]; then
            cp ../out_dist/Image ./Image
          else
            IMG="$(ls -1 ../out_dist/Image* 2>/dev/null | head -n 1 || true)"
            test -n "$IMG"
            cp "$IMG" ./Image
          fi
          sed -i "s/^BLOCK=.*/BLOCK=${{ inputs.flash_block }}/" anykernel.sh
          if [ "${{ inputs.include_dtbo }}" != "no" ] && [ -f ../out_dist/dtbo.img ]; then
            cp ../out_dist/dtbo.img ./dtbo.img
          fi
          if [ "${{ inputs.include_dtbo }}" = "yes" ]; then
            test -f ./dtbo.img
          fi
          KSU_TAG="NoKSU"
          if [ "${{ inputs.enable_sukisu }}" = "true" ]; then
            KSU_TAG="SukiSU"
          fi
          KSUVER="$(grep -m1 -Eo 'SukiSU-Ultra version \((GitHub|Github)\): [0-9]+' ../bazel_build.log 2>/dev/null | awk '{print $NF}' || true)"
          if [ -z "$KSUVER" ]; then
            KSUVER="unknown"
          fi
          COMMON_SHA="$(cd ../common && git rev-parse --short=12 HEAD)"
          KERNEL_NAME="${{ inputs.manifest_branch }}-g${COMMON_SHA}"
          SUFFIX="${{ inputs.kernel_suffix }}"
          if [ -n "$SUFFIX" ]; then
            AK3_NAME="AnyKernel3_${KSU_TAG}_${KSUVER}_6.12_${KERNEL_NAME}-${SUFFIX}.zip"
          else
            AK3_NAME="AnyKernel3_${KSU_TAG}_${KSUVER}_6.12_${KERNEL_NAME}.zip"
          fi
          zip -q -r "../$AK3_NAME" ./*
          echo "ak3_name=$AK3_NAME" >> "$GITHUB_OUTPUT"
          echo "ksu_ver=$KSUVER" >> "$GITHUB_OUTPUT"

      - name: 下载 SukiSU 管理器（尽量匹配接口版本）
        if: inputs.enable_sukisu && inputs.upload_dist && (inputs.mode == 'image' || inputs.mode == 'dist')
        id: download_manager
        run: |
          set -euo pipefail
          cd kernel_workspace
          mkdir -p managers
          KSUVER="${{ steps.create_zip.outputs.ksu_ver }}"
          URL=""
          if [ -n "$KSUVER" ] && [ "$KSUVER" != "unknown" ]; then
            URL="$(curl -fsSL "https://api.github.com/repos/SukiSU-Ultra/SukiSU-Ultra/releases?per_page=30" | jq -r --arg v "$KSUVER" '[.[] | .assets[]? | select(.name|endswith(".apk")) | select(.name|contains("_"+$v+"-release.apk"))][0].browser_download_url // empty')"
          fi
          if [ -z "$URL" ]; then
            URL="$(curl -fsSL "https://api.github.com/repos/SukiSU-Ultra/SukiSU-Ultra/releases/latest" | jq -r '.assets[]? | select(.name|endswith(".apk")) | .browser_download_url' | head -n 1)"
          fi
          test -n "$URL"
          NAME="$(basename "$URL")"
          curl -fL "$URL" -o "managers/$NAME"
          echo "mgr_name=$NAME" >> "$GITHUB_OUTPUT"

      - name: 上传 Bazel 构建日志
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: xiaomi17_${{ inputs.build_target }}_${{ inputs.manifest_branch }}_logs
          path: |
            kernel_workspace/bazel_build.log
            kernel_workspace/bazel_precheck.log
            kernel_workspace/ksu_precheck.log
          if-no-files-found: warn

      - name: 上传 AnyKernel3 ZIP（单独显示文件名）
        if: inputs.upload_dist && (inputs.mode == 'image' || inputs.mode == 'dist')
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.create_zip.outputs.ak3_name }}
          path: |
            kernel_workspace/${{ steps.create_zip.outputs.ak3_name }}
          if-no-files-found: error

      - name: 上传 SukiSU 管理器（单独显示文件名）
        if: steps.download_manager.outputs.mgr_name != ''
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.download_manager.outputs.mgr_name }}
          path: |
            kernel_workspace/managers/${{ steps.download_manager.outputs.mgr_name }}
          if-no-files-found: error

      - name: 上传产物（minimal）
        if: inputs.upload_dist && (inputs.mode == 'image' || inputs.mode == 'dist') && inputs.artifact_profile != 'full'
        uses: actions/upload-artifact@v7
        with:
          name: xiaomi17_${{ inputs.build_target }}_${{ inputs.manifest_branch }}_minimal
          path: |
            kernel_workspace/AnyKernel3_*.zip
            kernel_workspace/managers/*.apk
            kernel_workspace/xiaomi17_${{ inputs.build_target }}_${{ inputs.manifest_branch }}_minimal.zip
          if-no-files-found: error

      - name: 上传产物（full）
        if: inputs.upload_dist && inputs.mode == 'dist' && inputs.artifact_profile != 'minimal'
        uses: actions/upload-artifact@v7
        with:
          name: xiaomi17_${{ inputs.build_target }}_${{ inputs.manifest_branch }}_full
          path: |
            kernel_workspace/xiaomi17_${{ inputs.build_target }}_${{ inputs.manifest_branch }}_dist.tar.xz
          if-no-files-found: error

  release:
    if: inputs.create_release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载 dist 工件
        uses: actions/download-artifact@v8
        with:
          pattern: xiaomi17_${{ inputs.build_target }}_${{ inputs.manifest_branch }}_*
          merge-multiple: true
          path: ./release_assets

      - name: 设置发布信息
        run: |
          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "TIME=$TIME" >> $GITHUB_ENV
          echo "TIME_FORM=$TIME_FORM" >> $GITHUB_ENV
          echo "REL_NAME=${{ env.TAG_HEAD }}-${{ inputs.manifest_branch }}-${{ inputs.build_target }}" >> $GITHUB_ENV
          echo "KSUVER=unknown" >> $GITHUB_ENV
          echo "MGR_NAME=unknown" >> $GITHUB_ENV
          AK3="$(ls -1 release_assets/AnyKernel3_*.zip 2>/dev/null | head -n 1 || true)"
          if [ -n "$AK3" ]; then
            echo "KSUVER=$(basename "$AK3" | awk -F'_' '{print $3}')" >> $GITHUB_ENV
          fi
          MGR="$(ls -1 release_assets/managers/*.apk 2>/dev/null | head -n 1 || true)"
          if [ -n "$MGR" ]; then
            echo "MGR_NAME=$(basename "$MGR")" >> $GITHUB_ENV
          fi

      - name: 创建发布
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: "${{ env.TAG_HEAD }}-${{ env.TIME }}"
          name: "${{ env.REL_NAME }}"
          body: |
            - 设备：${{ env.DEVICE_CODENAME }}（${{ env.DEVICE_MODEL }} / ${{ env.DEVICE_SOC }}）
            - 构建目标：${{ inputs.build_target }}
            - manifest 分支：${{ inputs.manifest_branch }}
            - 编译参数：--config=fast --notrim --lto=none --config=release
            - SukiSU 接口版本：${{ env.KSUVER }}
            - SukiSU 管理器：${{ env.MGR_NAME }}
            - 构建时间：${{ env.TIME_FORM }}
          files: |
            release_assets/**/*.tar.xz
            release_assets/**/*
