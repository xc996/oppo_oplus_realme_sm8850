name: 小米17 GKI Bazel构建 6.12（SukiSU Ultra）

env:
  TZ: Asia/Shanghai
  DEVICE_MODEL: '25113PN0EC'
  DEVICE_CODENAME: 'pudding'
  DEVICE_SOC: 'SM8850'
  ANDROID_VERSION: 'android16'
  TAG_HEAD: 'Xiaomi17-GKI-build'

on:
  workflow_dispatch:
    inputs:
      manifest_branch:
        description: 'kernel/manifest 分支(默认 common-android16-6.12，可选 common-android16-6.12-2025-12 等)'
        required: true
        type: string
        default: 'common-android16-6.12'
      mode:
        description: '执行模式(precheck 只做预检 / build 产出 dist)'
        required: true
        type: choice
        default: 'precheck'
        options:
          - 'precheck'
          - 'build'
      build_target:
        description: '构建目标(dist/autofdo_dist/both)'
        required: true
        type: choice
        default: 'dist'
        options:
          - 'dist'
          - 'autofdo_dist'
          - 'both'
      enable_sukisu:
        description: '是否注入 SukiSU Ultra（builtin）'
        required: true
        type: boolean
        default: true
      sukisu_ref:
        description: 'SukiSU 版本(分支/标签/提交；默认 builtin，建议失败时固定为某个提交)'
        required: true
        type: string
        default: 'builtin'
      upload_dist:
        description: '是否上传 dist 工件'
        required: true
        type: boolean
        default: true
      create_release:
        description: '是否创建 GitHub Release（会打 tag 并上传打包产物）'
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            openjdk-17-jdk-headless \
            python-is-python3 \
            python3 \
            bc \
            bison \
            flex \
            build-essential \
            libssl-dev \
            libelf-dev \
            rsync \
            unzip \
            zip \
            xz-utils \
            file

      - name: 载入 Bazel 缓存
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ runner.os }}-xiaomi17-${{ inputs.manifest_branch }}
          restore-keys: |
            bazel-${{ runner.os }}-xiaomi17-
            bazel-${{ runner.os }}-

      - name: 安装 repo 工具
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
          chmod +x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: 同步 Kernel workspace（manifest）
        run: |
          rm -rf kernel_workspace
          mkdir -p kernel_workspace
          cd kernel_workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b "${{ inputs.manifest_branch }}" --depth=1

      - name: 载入 repo 缓存
        uses: actions/cache@v5
        with:
          path: |
            kernel_workspace/.repo/project-objects
            kernel_workspace/.repo/projects
          key: repo-${{ runner.os }}-${{ inputs.manifest_branch }}
          restore-keys: |
            repo-${{ runner.os }}-${{ inputs.manifest_branch }}-
            repo-${{ runner.os }}-

      - name: repo sync
        run: |
          set -euo pipefail
          cd kernel_workspace
          repo sync -c -j"$(nproc)" --no-tags --no-clone-bundle --optimized-fetch --prune

      - name: 注入 SukiSU Ultra（builtin）
        if: inputs.enable_sukisu
        run: |
          set -euo pipefail
          cd kernel_workspace/common
          curl -fsSL "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | sh -s "${{ inputs.sukisu_ref }}"
          test -f drivers/kernelsu/Kconfig
          grep -q "config KSU" drivers/kernelsu/Kconfig
          sed -i '/^#include <linux\/slab\.h>/a #include <linux\/vmalloc.h>' drivers/kernelsu/supercalls.c
          if ! grep -q '^ksu_obj-y += syscall_handler\.o$' drivers/kernelsu/Kbuild; then
            sed -i '/^ksu_obj-y += supercalls\.o$/a ksu_obj-y += syscall_handler.o' drivers/kernelsu/Kbuild
          fi
          grep -n '^ksu_obj-y += syscall_handler\.o$' drivers/kernelsu/Kbuild

      - name: 快速预检（KSU 模块编译）
        if: inputs.enable_sukisu
        run: |
          set -euo pipefail
          cd kernel_workspace
          CLANG_DIR="$(ls -d prebuilts/clang/host/linux-x86/clang-* 2>/dev/null | head -n 1)"
          test -n "$CLANG_DIR"
          export PATH="$PWD/$CLANG_DIR/bin:$PWD/prebuilts/kernel-build-tools/linux-x86/bin:$PATH"
          rm -rf out_ksu_precheck
          make -C common O="$PWD/out_ksu_precheck" gki_defconfig
          make -C common O="$PWD/out_ksu_precheck" olddefconfig
          make -C common -j"$(nproc)" O="$PWD/out_ksu_precheck" LLVM=1 LLVM_IAS=1 drivers/kernelsu/ 2>&1 | tee "$PWD/ksu_precheck.log"

      - name: 快速预检（仅生成内核配置）
        run: |
          set -euo pipefail
          cd kernel_workspace
          chmod +x tools/bazel
          tools/bazel build --config=fast --notrim --lto=none --config=release //common:kernel_aarch64_config 2>&1 | tee "$PWD/bazel_precheck.log"

      - name: 构建 GKI（Bazel, notrim + lto=none）
        if: inputs.mode == 'build'
        run: |
          set -euo pipefail
          cd kernel_workspace
          chmod +x tools/bazel
          rm -rf out_dist
          mkdir -p out_dist
          if [ "${{ inputs.build_target }}" = "dist" ]; then
            tools/bazel run --config=fast --notrim --lto=none --config=release //common:kernel_aarch64_dist -- --dist_dir="$PWD/out_dist" 2>&1 | tee "$PWD/bazel_build.log"
          elif [ "${{ inputs.build_target }}" = "autofdo_dist" ]; then
            tools/bazel run --config=fast --notrim --lto=none --config=release //common:kernel_aarch64_autofdo_dist -- --dist_dir="$PWD/out_dist" 2>&1 | tee "$PWD/bazel_build.log"
          else
            tools/bazel run --config=fast --notrim --lto=none --config=release //common:kernel_aarch64_dist -- --dist_dir="$PWD/out_dist" 2>&1 | tee "$PWD/bazel_build.log"
            tools/bazel run --config=fast --notrim --lto=none --config=release //common:kernel_aarch64_autofdo_dist -- --dist_dir="$PWD/out_dist" 2>&1 | tee -a "$PWD/bazel_build.log"
          fi
          if [ ! -d out_dist ] || [ -z "$(ls -A out_dist 2>/dev/null)" ]; then
            if [ -d dist ] && [ -n "$(ls -A dist 2>/dev/null)" ]; then
              rsync -a dist/ out_dist/
            fi
          fi
          if [ ! -d out_dist ] || [ -z "$(ls -A out_dist 2>/dev/null)" ]; then
            if [ -d out ]; then
              while IFS= read -r d; do
                rsync -a "$d"/ out_dist/ || true
              done < <(find out -maxdepth 5 -type d -name dist 2>/dev/null)
            fi
          fi
          echo "dist 内容预览："
          ls -lah out_dist || true
          test -n "$(ls -A out_dist 2>/dev/null)"
          tar -cJf "xiaomi17_${{ inputs.build_target }}_${{ inputs.manifest_branch }}_dist.tar.xz" -C "$PWD" out_dist

      - name: 上传 Bazel 构建日志
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: xiaomi17_${{ inputs.build_target }}_${{ inputs.manifest_branch }}_logs
          path: |
            kernel_workspace/bazel_build.log
            kernel_workspace/bazel_precheck.log
            kernel_workspace/ksu_precheck.log
          if-no-files-found: warn

      - name: 上传 dist 工件
        if: inputs.upload_dist && inputs.mode == 'build'
        uses: actions/upload-artifact@v7
        with:
          name: xiaomi17_${{ inputs.build_target }}_${{ inputs.manifest_branch }}_dist
          path: |
            kernel_workspace/out_dist/**
            kernel_workspace/xiaomi17_${{ inputs.build_target }}_${{ inputs.manifest_branch }}_dist.tar.xz
          if-no-files-found: error

  release:
    if: inputs.create_release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载 dist 工件
        uses: actions/download-artifact@v8
        with:
          name: xiaomi17_${{ inputs.build_target }}_${{ inputs.manifest_branch }}_dist
          path: ./release_assets

      - name: 设置发布信息
        run: |
          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "TIME=$TIME" >> $GITHUB_ENV
          echo "TIME_FORM=$TIME_FORM" >> $GITHUB_ENV
          echo "REL_NAME=${{ env.TAG_HEAD }}-${{ inputs.manifest_branch }}-${{ inputs.build_target }}" >> $GITHUB_ENV

      - name: 创建发布
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: "${{ env.TAG_HEAD }}-${{ env.TIME }}"
          name: "${{ env.REL_NAME }}"
          body: |
            - 设备：${{ env.DEVICE_CODENAME }}（${{ env.DEVICE_MODEL }} / ${{ env.DEVICE_SOC }}）
            - 构建目标：${{ inputs.build_target }}
            - manifest 分支：${{ inputs.manifest_branch }}
            - 编译参数：--config=fast --notrim --lto=none --config=release
            - 构建时间：${{ env.TIME_FORM }}
          files: |
            release_assets/**/*.tar.xz
            release_assets/**/*
